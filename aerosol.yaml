filename_bands: ${HOME}/Data/Optics/SARB/LFL_bands.nc

MAM4:
    a1:
        name: Accumulation
        filename_rrtm: ${HOME}/Data/Optics/MAM4/mam4_mode1_rrtmg_aeronetdust_c141106.nc
        filename_sarb: ${HOME}/Data/Optics/SARB/mam4_mode1_larc_c000003.v2.nc
        types:
            - BC
            - POM
            - SOA
            - SU
            - DU
            - SS
        soa_flavors: 5
    a2:
        name: Aitken
        filename_rrtm: ${HOME}/Data/Optics/MAM4/mam4_mode2_rrtmg_aitkendust_c141106.nc
        filename_sarb: ${HOME}/Data/Optics/SARB/mam4_mode2_larc_c000003.v2.nc
        types:
            - SOA
            - SU
            - DU
            - SS
        soa_flavors: 5
    a3:
        name: Coarse
        filename_rrtm: ${HOME}/Data/Optics/MAM4/mam4_mode3_rrtmg_aeronetdust_c141106.nc
        filename_sarb: ${HOME}/Data/Optics/SARB/mam4_mode3_larc_c000003.v2.nc
        types:
            - SU
            - DU
            - SS
    a4:
        name: Primary Carbon
        filename_rrtm: ${HOME}/Data/Optics/MAM4/mam4_mode4_rrtmg_c130628.nc
        filename_sarb: ${HOME}/Data/Optics/SARB/mam4_mode4_larc_c000003.v2.nc
        types:
            - BC
            - POM
    # monodisperse base table for bin-resolved dust/sea-salt; used by refine_lut
    mono:
        name: Monodisperse bins
        filename_sarb: ${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc

Types:
    WAT:
        name: Water
        filename: ${HOME}/Data/Optics/MERRA2/optics_WAT.nc
        density: 1.0
        hygroscopicity:
            - None
        plot_color: dodgerblue
    ICE:
        name: Ice
        filename: ${HOME}/Data/Optics/MERRA2/optics_ICE.nc
        density: 1.0
        hygroscopicity:
            - None
        plot_color: aqua
    BC:
        name: Black Carbon
        filename: ${HOME}/Data/Optics/MERRA2/optics_BC.v1_3.nc
        density: 1.0
        hygroscopicity:
            - 0.01
            - 0
            - 0
        plot_color: dimgray
    BCPHO:
        name: Hydrophobic Black Carbon
        filename: ${HOME}/Data/Optics/MERRA2/optics_BC.v1_3.nc
    BCPHI:
        name: Hydrophilic Black Carbon
        filename: ${HOME}/Data/Optics/MERRA2/optics_BC.v1_3.nc
    POM:
        name: Primary Organic Matter
        filename: ${HOME}/Data/Optics/MERRA2/optics_OC.v1_3.nc
        density: 1.8 # insoluble 2.0
        hygroscopicity:
            - 0.14
            - 0
            - 0
        plot_color: darkgreen
    SOA:
        name: Secondary Organic Aerosol
        filename: ${HOME}/Data/Optics/MERRA2/optics_OC.v1_3.nc
        density: 1.8
        hygroscopicity:
            - 0.14
            - 0
            - 0
        plot_color: green
    OCPHO:
        name: Hydrophobic Organic Carbon
        filename: ${HOME}/Data/Optics/MERRA2/optics_OC.v1_3.nc
    OCPHI:
        name: Hydrophilic Organic Carbon
        filename: ${HOME}/Data/Optics/MERRA2/optics_OC.v1_3.nc
    SU:
        name: Sulfate
        filename: ${HOME}/Data/Optics/MERRA2/optics_SU.v1_3.nc
        density: 1.7
        hygroscopicity:
            - 2.42848
            - -3.85261
            - 1.88159
        plot_color: darkslateblue
    DU:
        name: Dust
        filename: ${HOME}/Data/Optics/MERRA2/optics_DU.v14_2.nc
        density: 2.6
        hygroscopicity:
            - 0.14
            - 0
            - 0
        plot_color: saddlebrown
    SS:
        name: Sea Salt
        filename: ${HOME}/Data/Optics/MERRA2/optics_SS.v3_3.nc
        density: 2.2
        hygroscopicity:
            - 4.83257
            - -6.92329
            - 3.27805
        plot_color: mediumturquoise
    NI:
        name: Nitrate
        filename: ${HOME}/Data/Optics/MERRA2/optics_NI.v2_5.nc
        density: 1.7
        hygroscopicity:
            - 2.42848
            - -3.85261
            - 1.88159
        plot_color: goldenrod

Mixtures:
    Maritime:
        SS: 0.8
        SU: 0.2

Sources:
    GEOSIT:
        input_pattern: GEOSIT/YYYY/MM/GEOS.it.asm.aer_inst_3hr_glo_L576x361_v72.GEOS5294.YYYY-MM-DDTHH00.V01.nc4
        output_pattern: GEOSIT_MAM/YYYY/MM/GEOS.it.asm.aer_inst_3hr_glo_L576x361_v72.GEOS5294.{label}_{band}.YYYY-MM-DDTHH00.V01.nc4
        external_vis_pattern: GEOSIT/YYYY/MM/GEOS.it.asm.aer_inst_3hr_glo_L576x361_v72.GEOS5294.AER_550NM.YYYY-MM-DDTHH00.V01.nc4
        dims:
            time: time
            lev: lev
            lat: lat
            lon: lon
        fields:
            rh: RH
            temperature: T
            delp: DELP
            ps: PS
        species:
            SO4: SO4
            OCPHOBIC: OCPHOBIC
            OCPHILIC: OCPHILIC
            BCPHOBIC: BCPHOBIC
            BCPHILIC: BCPHILIC
            NO3AN1: NO3AN1
            NO3AN2: NO3AN2
            NO3AN3: NO3AN3
            SS001: SS001
            SS002: SS002
            SS003: SS003
            SS004: SS004
            SS005: SS005
            DU001: DU001
            DU002: DU002
            DU003: DU003
            DU004: DU004
            DU005: DU005
    MERRA2:
        input_pattern: MERRA2/YYYY/MM/MERRA2_300.inst3_3d_aer_Nv.YYYYMMDD.nc4
        output_pattern: MERRA2/YYYY/MM/MERRA2_300.inst3_3d_aer_Nv.{label}_{band}.YYYYMMDDTHH.nc4
        external_vis_pattern: MERRA2/YYYY/MM/MERRA2_300.inst3_3d_aer_Nv.AER_550NM.YYYYMMDDTHH.nc4
        dims:
            time: time
            lev: lev
            lat: lat
            lon: lon
        fields:
            rh: RH
            temperature: T
            delp: DELP
            ps: PS
        species:
            SO4: SO4
            OCPHOBIC: OCPHOBIC
            OCPHILIC: OCPHILIC
            BCPHOBIC: BCPHOBIC
            BCPHILIC: BCPHILIC
            SS001: SS001
            SS002: SS002
            SS003: SS003
            SS004: SS004
            SS005: SS005
            DU001: DU001
            DU002: DU002
            DU003: DU003
            DU004: DU004
            DU005: DU005

Schemes:
    MAM4:
        modes:
            a1:
                name: Accumulation
                dry_radius_um: 0.055
                sigma_g: 1.8
                filename_sarb: ${HOME}/Data/Optics/SARB/mam4_mode1_larc_c000003.v2.nc
            a2:
                name: Aitken
                dry_radius_um: 0.012
                sigma_g: 1.6
                filename_sarb: ${HOME}/Data/Optics/SARB/mam4_mode2_larc_c000003.v2.nc
            a3:
                name: Coarse
                dry_radius_um: 0.40
                sigma_g: 1.8
                filename_sarb: ${HOME}/Data/Optics/SARB/mam4_mode3_larc_c000003.v2.nc
            a4:
                name: Primary Carbon
                dry_radius_um: 0.050
                sigma_g: 1.6
                filename_sarb: ${HOME}/Data/Optics/SARB/mam4_mode4_larc_c000003.v2.nc
            # Externally-mixed, bin-resolved dust and sea salt (monodisperse at the
            # bin radius). sigma_g=1.0 selects the monodisperse LUT.
            du1: {name: Dust bin 1, dry_radius_um: 0.73, sigma_g: 1.0, filename_sarb: "${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc"}
            du2: {name: Dust bin 2, dry_radius_um: 1.40, sigma_g: 1.0, filename_sarb: "${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc"}
            du3: {name: Dust bin 3, dry_radius_um: 2.40, sigma_g: 1.0, filename_sarb: "${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc"}
            du4: {name: Dust bin 4, dry_radius_um: 4.50, sigma_g: 1.0, filename_sarb: "${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc"}
            du5: {name: Dust bin 5, dry_radius_um: 8.00, sigma_g: 1.0, filename_sarb: "${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc"}
            ss1: {name: Sea salt bin 1, dry_radius_um: 0.08, sigma_g: 1.0, filename_sarb: "${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc"}
            ss2: {name: Sea salt bin 2, dry_radius_um: 0.30, sigma_g: 1.0, filename_sarb: "${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc"}
            ss3: {name: Sea salt bin 3, dry_radius_um: 1.00, sigma_g: 1.0, filename_sarb: "${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc"}
            ss4: {name: Sea salt bin 4, dry_radius_um: 3.00, sigma_g: 1.0, filename_sarb: "${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc"}
            ss5: {name: Sea salt bin 5, dry_radius_um: 8.00, sigma_g: 1.0, filename_sarb: "${HOME}/Data/Optics/SARB/mam4_mono_larc_c000003.v2.nc"}
        allocations:
            SO4: {a1: 0.90, a2: 0.10, a3: 0.00, a4: 0.00}
            OCPHILIC: {a1: 1.00}
            BCPHILIC: {a1: 1.00}
            OCPHOBIC: {a4: 1.00}
            BCPHOBIC: {a4: 1.00}
            NO3: {a1: 0.70, a3: 0.30}
            POM: {a1: 0.80, a2: 0.20}
            SOA: {a1: 0.80, a2: 0.20}
            # bin-resolved dust and sea salt -> one external mode per bin
            DU001: {du1: 1.00}
            DU002: {du2: 1.00}
            DU003: {du3: 1.00}
            DU004: {du4: 1.00}
            DU005: {du5: 1.00}
            SS001: {ss1: 1.00}
            SS002: {ss2: 1.00}
            SS003: {ss3: 1.00}
            SS004: {ss4: 1.00}
            SS005: {ss5: 1.00}
        size_bins:
            NO3AN:
                species: [NO3AN1, NO3AN2, NO3AN3]
                radii_um: [0.15, 0.50, 1.50]
